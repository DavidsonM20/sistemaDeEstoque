<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="../css/reset.css"/>
        <link rel="stylesheet" href="../css/cores.css"/>
        <title>Dashboard</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <header id="header"> 
            <h1 id="tituloDashboard">Estoque</h1>
            <nav>
                <ul>
                    <li><a href="#">Inicio</a></li>
                    <li><a href="#">Gerenciamento</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <section id="resumoEstoque">
                <div class="card-resumo">
                    <h2 class="titulo-card">Entrada</h2>
                    <p class="valor-card">100</p>
                </div>
                <div class="card-resumo">
                    <h2 class="titulo-card">Saída</h2>
                    <p class="valor-card">80</p>
                </div>
                <div class="card-resumo">
                    <h2 class="titulo-card">Total</h2>
                    <p class="valor-card">20</p>
                </div>
            </section>
            <section id="filtro">
                <div class="grupo-filtro">
                    <label>Data</label>
                    <input type="date" >
                </div>
                <div>
                    <label>Tipo</label>
                    <select>
                        <option>Selecione uma opçao</option>
                        <option>Entrada</option>
                        <option>Saída</option>
                    </select>
                </div>
                <div>
                    <label>Pesquisar item</label>
                    <input type="text" placeholder="Digite o nome do produto" >
                </div>
                <div>
                    <button>Perquisar</button>
                </div>
            </section>
            <section>
                <div>
                    <table>
                        <thead>
                            <tr>
                                <th>Código de barras</th>
                                <th>Nome</th>
                                <th>Fabricante</th>
                                <th>Marca</th>
                                <th>Quantidade</th>
                                <th>Valor unitario</th>
                                <th>Totaç</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>123456789</td>
                                <td>Mouse</td>
                                <td>Logitech</td>
                                <td>MX</td>
                                <td>10</td>
                                <td>R$80,00</td>
                                <td>R$800,00</td>
                            </tr>
                            <tr>
                                <td>123456789</td>
                                <td>Cadeira</td>
                                <td>Shark</td>
                                <td>ZH</td>
                                <td>3</td>
                                <td>R$500,00</td>
                                <td>R$1500.00</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
            <<section>
                <div>
                    <label>Página</label>
                    <select>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                    </select>
                </div>
                <div>
                    <button>Voltar</button>
                    <button>Próximo</button>
                </div>
            </section>
        </main>
    </body>
</html>
